<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Task Manager Pro</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="showCategoryForm = !showCategoryForm">
        <ion-icon name="options-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar>
    <ion-segment scrollable (ionChange)="filterTasks($event)" value="All">
      <ion-segment-button value="All">
        <ion-label>All</ion-label>
      </ion-segment-button>
      <ion-segment-button
        *ngFor="let cat of (categories$ | async); trackBy: trackByFn"
        [value]="cat.name"
      >
        <ion-label>{{ cat.name | titlecase }}</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-card *ngIf="showCategoryForm" class="ion-margin-bottom">
    <ion-item lines="none">
      <ion-input
        [label]="editingCategory ? 'Edit Category' : 'New Category'"
        labelPlacement="floating"
        [(ngModel)]="newCategoryName"
      ></ion-input>
      <ion-button slot="end" (click)="handleCategorySubmit()">
        <ion-icon
          [name]="editingCategory ? 'save-outline' : 'add-outline'"
        ></ion-icon>
      </ion-button>
    </ion-item>
    <ion-list *ngIf="(categories$ | async) as cats">
      <ion-item *ngFor="let cat of cats; trackBy: trackByFn">
        <ion-label>{{ cat.name }}</ion-label>
        <ion-buttons slot="end">
          <ion-button
            color="primary"
            fill="clear"
            (click)="startEditCategory(cat)"
          >
            <ion-icon name="create-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button
            fill="clear"
            color="danger"
            (click)="deleteCategory(cat.id!, cat.name)"
          >
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
    </ion-list>
  </ion-card>

  <ion-list lines="none">
    <ion-card
      *ngFor="let task of (tasks$ | async); trackBy: trackByFn"
      mode="ios"
    >
      <ion-item lines="none">
        <ion-checkbox
          slot="start"
          [checked]="task.completed"
          (ionChange)="toggleTask(task)"
        ></ion-checkbox>
        <ion-label
          [style.text-decoration]="task.completed ? 'line-through' : 'none'"
        >
          <h2 style="font-weight: bold">{{ task.name }}</h2>
          <ion-badge color="tertiary" mode="ios">{{ task.category }}</ion-badge>
        </ion-label>

        <ion-buttons slot="end">
          <ion-button
            fill="clear"
            color="primary"
            (click)="startEditTask(task)"
          >
            <ion-icon name="create-outline" slot="icon-only"></ion-icon>
          </ion-button>
          <ion-button
            *ngIf="showDeleteButton"
            fill="clear"
            color="danger"
            (click)="deleteTask(task.id!)"
          >
            <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
    </ion-card>
  </ion-list>

  <ion-modal [isOpen]="isTaskModalOpen" (didDismiss)="setTaskModalOpen(false)">
    <ng-template>
      <ion-header>
        <ion-toolbar color="primary">
          <ion-title>{{ editingTask ? 'Edit Task' : 'New Task' }}</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="setTaskModalOpen(false)">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item lines="inset" class="ion-margin-bottom">
          <ion-label position="stacked">What needs to be done?</ion-label>
          <ion-input [(ngModel)]="newTaskName"></ion-input>
        </ion-item>

        <ion-item lines="inset" class="ion-margin-bottom">
          <ion-select
            label="Category"
            labelPlacement="stacked"
            [(ngModel)]="newTaskCategory"
          >
            <ion-select-option
              *ngFor="let cat of (categories$ | async)"
              [value]="cat.name"
            >
              {{ cat.name | titlecase }}
            </ion-select-option>
          </ion-select>
        </ion-item>

        <ion-button
          expand="block"
          (click)="handleTaskSubmit()"
          [disabled]="!newTaskName.trim() || !newTaskCategory"
        >
          {{ editingTask ? 'Update Task' : 'Save Task' }}
        </ion-button>
      </ion-content>
    </ng-template>
  </ion-modal>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="setTaskModalOpen(true)">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
